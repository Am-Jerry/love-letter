<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 A letter for Malak</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@500;700&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  font-family: 'Jost', sans-serif;
  background: linear-gradient(145deg, #fff0f4 0%, #fde2ea 50%, #fceef3 100%);
  overflow-x: hidden;
}

/* ── PETALS ── */
.petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.petal { position: absolute; top: -40px; animation: fall linear infinite; opacity: 0; }
@keyframes fall {
  0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
  6%   { opacity: 0.5; }
  90%  { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(105vh) rotate(380deg); }
}

/* ── ENVELOPE SCENE ── */
.scene {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; padding: 40px 20px;
}

.envelope { width: 320px; cursor: pointer; position: relative; transition: filter 0.3s; flex-shrink: 0; }
.envelope:hover { filter: drop-shadow(0 12px 28px rgba(197,96,122,0.25)); }

.env-body {
  width: 100%; aspect-ratio: 5 / 3.2;
  background: linear-gradient(160deg, #fce4eb, #f8cdd9);
  border-radius: 5px 5px 10px 10px; position: relative;
  box-shadow: 0 10px 36px rgba(197,96,122,0.18), 0 2px 8px rgba(197,96,122,0.1);
  overflow: hidden;
}
.env-body::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 54%;
  background: linear-gradient(175deg, #f3b8c8, #eea6bb);
  clip-path: polygon(0% 100%, 50% 2%, 100% 100%);
}
.env-side { position: absolute; top: 0; bottom: 0; width: 52%; background: #f7cad6; }
.env-side.left  { left: 0;  clip-path: polygon(0 0, 100% 50%, 0 100%); }
.env-side.right { right: 0; clip-path: polygon(100% 0, 0 50%, 100% 100%); }

.env-flap {
  position: absolute; top: 0; left: 0; right: 0; height: 54%;
  background: linear-gradient(170deg, #fceaf0, #f8d0dc);
  clip-path: polygon(0% 0%, 50% 100%, 100% 0%);
  transform-origin: top center; transform: rotateX(0deg);
  transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  z-index: 4; border-radius: 5px 5px 0 0;
}
.envelope.opened .env-flap { transform: rotateX(-180deg); }

.wax {
  position: absolute; top: 34%; left: 50%; transform: translate(-50%, -50%);
  z-index: 5; width: 46px; height: 46px;
  background: radial-gradient(circle at 35% 35%, #e8879a, #c5607a 60%, #a84860);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem;
  box-shadow: 0 3px 10px rgba(165,60,90,0.35), inset 0 1px 2px rgba(255,255,255,0.25);
  transition: opacity 0.3s, transform 0.3s;
}
.envelope.opened .wax { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }

.letter-peek {
  position: absolute; bottom: 12px; left: 12%; right: 12%; height: 55%;
  background: #fffbfc; border-radius: 4px 4px 3px 3px;
  box-shadow: 0 -2px 8px rgba(197,96,122,0.1); z-index: 2;
  transform: translateY(0); transition: transform 0.55s cubic-bezier(.4,0,.2,1) 0.15s;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.envelope.opened .letter-peek { transform: translateY(-70px); }
.letter-peek::before {
  content: ''; position: absolute; top: 6px; left: 18%; right: 18%; height: 2px;
  background: linear-gradient(to right, transparent, rgba(232,137,154,0.4), transparent);
  border-radius: 2px;
}
.letter-peek-heart { font-size: 1.4rem; opacity: 0.2; }

.hint {
  font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase;
  color: #c5778a; opacity: 0.7; animation: blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:0.85} }

/* ── LETTER OVERLAY ── */
.letter-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(253,232,238,0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
  overflow-y: auto;
  padding: 24px 16px 40px;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  gap: 0;
}
.letter-overlay.visible { opacity: 1; pointer-events: all; }

/* ── LETTER + PHOTOS LAYOUT ── */
.letter-layout {
  position: relative;
  width: 100%;
  max-width: 860px;
  margin: 0 auto;
  padding: 40px 0 20px;
  /* photos float absolutely around the card on desktop */
}

/* ── LETTER CARD ── */
.letter-card {
  width: min(480px, 100%);
  margin: 0 auto;
  background: #fffbfc; border-radius: 3px;
  padding: 44px 44px 36px;
  box-shadow:
    0 4px 0 rgba(197,96,122,0.04),
    0 20px 60px rgba(197,96,122,0.16),
    0 60px 80px rgba(197,96,122,0.07);
  border: 1px solid rgba(232,137,154,0.15);
  position: relative;
  transform: translateY(20px);
  transition: transform 0.5s cubic-bezier(.22,.68,0,1.15) 0.2s;
}
.letter-overlay.visible .letter-card { transform: translateY(0); }

.letter-card::before {
  content: ''; position: absolute; top: 0; left: 12%; right: 12%; height: 3px;
  background: linear-gradient(to right, transparent, #e8899a, #d4a0a8, #e8899a, transparent);
  border-radius: 0 0 3px 3px; opacity: 0.55;
}

.close-btn {
  position: absolute; top: 14px; right: 14px; width: 28px; height: 28px;
  border-radius: 50%; border: 1px solid rgba(197,96,122,0.25);
  background: white; color: #c5607a; font-size: 0.85rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  z-index: 5;
}
.close-btn:hover { background: #fde2ea; transform: rotate(90deg); }

.letter-date {
  font-size: 0.67rem; letter-spacing: 2.5px; text-transform: uppercase;
  color: #d4a0a8; text-align: right; margin-bottom: 24px;
}
.letter-to {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 1.6rem; font-weight: 300; color: #c5607a;
  margin-bottom: 18px; line-height: 1.3;
}
.letter-body {
  font-family: 'Cormorant Garamond', serif; font-size: 1.08rem;
  font-weight: 300; line-height: 1.9; color: #3d1f28;
  white-space: pre-wrap; word-break: break-word; margin-bottom: 28px;
}
.letter-sig-label {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 0.9rem; color: #3d1f28; opacity: 0.6; margin-bottom: 2px;
}
.letter-sig {
  font-family: 'Dancing Script', cursive; font-size: 2rem; color: #c5607a; line-height: 1.2;
  margin-bottom: 0;
}

/* ── COUNTDOWN — inside letter, below sig ── */
.countdown-inner {
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px solid rgba(232,137,154,0.18);
  text-align: center;
}
.cd-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: 0.82rem; color: #c5778a;
  letter-spacing: 0.5px; line-height: 1.5;
  margin-bottom: 8px;
}
.cd-label span { color: #c5607a; font-style: normal; }
.cd-chips {
  display: inline-flex; align-items: baseline; gap: 3px;
  font-family: 'Cormorant Garamond', serif; font-weight: 300;
  font-size: 0.82rem; color: #c5778a;
  flex-wrap: wrap; justify-content: center;
}
.cd-num {
  font-size: 1.05rem; color: #c5607a; font-weight: 400;
  font-style: italic; line-height: 1;
}
.cd-unit { font-size: 0.72rem; opacity: 0.65; }
.cd-dot { opacity: 0.3; margin: 0 2px; }

/* ── VINYL PLAYER — inside letter ── */
.vinyl-wrap {
  margin-top: 20px; padding-top: 20px;
  border-top: 1px solid rgba(232,137,154,0.18);
}
.vinyl-header-label {
  font-size: 0.62rem; letter-spacing: 3px; text-transform: uppercase;
  color: #d4a0a8; text-align: center; margin-bottom: 14px;
}

.vinyl-player {
  display: flex; align-items: center; gap: 16px;
  background: linear-gradient(135deg, rgba(252,228,235,0.7), rgba(248,208,218,0.5));
  border-radius: 3px; padding: 14px 16px 14px 14px;
  border: 1px solid rgba(232,137,154,0.18);
}

/* ── VINYL DISC — now shows album art ── */
.vinyl-disc-wrap {
  position: relative; flex-shrink: 0;
  width: 72px; height: 72px;
}
.vinyl-disc {
  width: 72px; height: 72px; border-radius: 50%;
  background:
    radial-gradient(circle at center,
      transparent 0%, transparent 22%,
      #1e0810 23%, #2a0a12 28%, #1e0810 33%,
      #2a0a12 38%, #1e0810 43%, #2a0a12 48%,
      #1e0810 53%, #2a0a12 58%, #1e0810 63%,
      #2a0a12 68%, #3d1520 100%);
  box-shadow: 0 4px 14px rgba(30,8,16,0.4), inset 0 1px 2px rgba(255,255,255,0.06);
  will-change: transform;
  position: relative;
}
.vinyl-disc.spinning { animation: vinylSpin 3s linear infinite; }
@keyframes vinylSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* album art circle in the center of the disc */
.vinyl-art {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 34px; height: 34px; border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.15);
  background: radial-gradient(circle at 40% 35%, #f9cdd8, #e8899a);
  pointer-events: none; flex-shrink: 0;
  /* spins with the disc */
}
.vinyl-art img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  border-radius: 50%;
}
/* tiny center spindle hole */
.vinyl-spindle {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 6px; height: 6px; border-radius: 50%;
  background: #fde2ea; pointer-events: none; z-index: 2;
}

.vinyl-needle {
  position: absolute; top: -6px; right: -12px;
  width: 38px; height: 38px; pointer-events: none;
  transform-origin: 88% 12%;
  transform: rotate(-22deg);
  transition: transform 0.7s cubic-bezier(.4,0,.2,1);
}
.vinyl-needle.playing { transform: rotate(0deg); }
.vinyl-needle svg { width: 100%; height: 100%; }

/* info & controls */
.vinyl-info { flex: 1; min-width: 0; }

/* track info row: album art thumbnail + text */
.vinyl-meta {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.vinyl-thumb {
  width: 36px; height: 36px; border-radius: 3px; flex-shrink: 0;
  overflow: hidden; border: 1px solid rgba(232,137,154,0.2);
  background: #fde2ea;
}
.vinyl-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.vinyl-text { min-width: 0; }
.vinyl-track {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 0.95rem; color: #3d1f28; font-weight: 300;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.2; margin-bottom: 2px;
}
.vinyl-artist {
  font-size: 0.63rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: #c5778a; opacity: 0.75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.vinyl-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.vbtn {
  border: none; background: none; cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, opacity 0.15s; color: #c5607a;
}
.vbtn:hover { transform: scale(1.15); opacity: 0.8; }
.vbtn svg { display: block; }

.play-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #e8899a, #c5607a);
  box-shadow: 0 3px 10px rgba(197,96,122,0.35); color: white;
  transition: transform 0.2s, box-shadow 0.2s;
}
.play-btn:hover { transform: scale(1.1) !important; box-shadow: 0 5px 16px rgba(197,96,122,0.45); }

.vinyl-progress-wrap {
  position: relative; height: 3px; background: rgba(197,96,122,0.15);
  border-radius: 2px; cursor: pointer;
}
.vinyl-progress-fill {
  height: 100%; background: linear-gradient(to right, #e8899a, #c5607a);
  border-radius: 2px; width: 0%; transition: width 0.5s linear; position: relative;
}
.vinyl-progress-fill::after {
  content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
  width: 8px; height: 8px; border-radius: 50%;
  background: #c5607a; box-shadow: 0 1px 4px rgba(197,96,122,0.5);
}
.vinyl-time {
  display: flex; justify-content: space-between; margin-top: 5px;
  font-size: 0.58rem; letter-spacing: 1px; color: #c5778a; opacity: 0.65;
}
.vinyl-open-link {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  margin-top: 10px; font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: #c5607a; opacity: 0.7; text-decoration: none;
  border: 1px solid rgba(197,96,122,0.25); border-radius: 100px;
  padding: 5px 12px; transition: all 0.2s;
}
.vinyl-open-link:hover { background: #fde2ea; opacity: 1; }

/* ═══════════════════════════════════
   PHOTOS — scattered around the letter
   ═══════════════════════════════════ */

/* Mobile/tablet: stacked strip below the card */
.photos-strip {
  display: none; /* hidden on desktop — desktop uses absolute floaters */
  flex-direction: row; flex-wrap: wrap;
  justify-content: center; gap: 12px;
  width: 100%; max-width: 480px;
  margin: 20px auto 0;
  padding: 0 8px;
}

/* Desktop: photos float left and right of the card */
.photo-float {
  display: none; /* shown via JS on desktop */
  position: absolute;
  cursor: zoom-in;
  transition: transform 0.3s cubic-bezier(.22,.68,0,1.3), box-shadow 0.3s, z-index 0s;
}
.photo-float:hover { z-index: 10 !important; }

/* Sharp photo frames — thin elegant border, no radius */
.photo-frame-inner {
  background: white;
  padding: 5px 5px 22px; /* polaroid style */
  box-shadow: 0 4px 18px rgba(197,96,122,0.18), 0 1px 5px rgba(197,96,122,0.1);
  border: 1px solid rgba(232,137,154,0.2);
  border-radius: 1px; /* sharp */
  overflow: hidden;
  transition: box-shadow 0.3s;
}
.photo-float:hover .photo-frame-inner,
.photos-strip .photo-frame-inner:hover {
  box-shadow: 0 10px 32px rgba(197,96,122,0.28), 0 2px 8px rgba(197,96,122,0.15);
}
.photo-frame-inner img {
  display: block; width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 0; /* sharp edges */
  filter: saturate(0.92) brightness(1.02);
}
.photo-frame-inner .img-fallback {
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; color: rgba(197,96,122,0.35);
  background: #fde2ea; width: 100%; height: 100%;
}

/* Strip version (mobile/tablet) */
.photos-strip .photo-item {
  cursor: zoom-in;
  transition: transform 0.3s cubic-bezier(.22,.68,0,1.3);
}
.photos-strip .photo-item:hover { transform: scale(1.04) rotate(0deg) !important; }
.photos-strip .photo-item .photo-frame-inner {
  width: 120px; height: 120px;
}
.photos-strip .photo-item .photo-frame-inner img {
  width: 120px; height: 120px;
}
/* tilt in strip */
.photos-strip .photo-item:nth-child(odd)  { transform: rotate(1.2deg); }
.photos-strip .photo-item:nth-child(even) { transform: rotate(-1.5deg); }

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(61,20,35,0.92); backdrop-filter: blur(14px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s; cursor: zoom-out;
}
.lightbox.open { opacity: 1; pointer-events: all; }
.lightbox img {
  max-width: 92vw; max-height: 88vh;
  border-radius: 0; border: 4px solid rgba(255,255,255,0.88);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transform: scale(0.93); transition: transform 0.35s cubic-bezier(.22,.68,0,1.2);
  object-fit: contain;
}
.lightbox.open img { transform: scale(1); }
.lightbox-close {
  position: absolute; top: 18px; right: 22px; width: 36px; height: 36px;
  border-radius: 50%; border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.1); color: white; font-size: 1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.lightbox-close:hover { background: rgba(255,255,255,0.2); }

/* ── HEARTS ── */
.heart {
  position: fixed; pointer-events: none; font-size: 1.1rem;
  z-index: 30; animation: heartUp 1.1s ease-out forwards;
}
@keyframes heartUp {
  0%   { opacity: 1; transform: translate(0,0) scale(0.4); }
  60%  { opacity: 1; }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.3); }
}

/* ── SCROLLBAR ── */
.letter-overlay::-webkit-scrollbar { width: 4px; }
.letter-overlay::-webkit-scrollbar-track { background: transparent; }
.letter-overlay::-webkit-scrollbar-thumb { background: rgba(197,96,122,0.18); border-radius: 2px; }

/* ═══════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════ */

/* Desktop: wide enough for floating photos */
@media (min-width: 900px) {
  .letter-layout {
    padding: 60px 200px;
    /* side columns are reserved for photos */
  }
  /* floaters shown via JS */
}

/* Tablet: side floaters replaced by strip */
@media (max-width: 899px) {
  .photo-float { display: none !important; }
  .photos-strip { display: flex; }
  .letter-layout { padding: 20px 0 0; }
}

/* Mobile */
@media (max-width: 480px) {
  .letter-card { padding: 32px 24px 28px; border-radius: 2px; }
  .vinyl-player { flex-wrap: wrap; }
  .vinyl-disc-wrap { width: 60px; height: 60px; }
  .vinyl-disc { width: 60px; height: 60px; }
  .photos-strip .photo-item .photo-frame-inner,
  .photos-strip .photo-item .photo-frame-inner img { width: 100px; height: 100px; }
}
</style>
</head>

<!-- ══════════════════════════════════════ -->

<!-- ENVELOPE SCENE -->
<div class="scene" id="scene">
  <div class="envelope" id="env" onclick="openEnvelope()">
    <div class="env-body">
      <div class="env-side left"></div>
      <div class="env-side right"></div>

<!-- LETTER OVERLAY (full-page scroll) -->
<div class="letter-overlay" id="letterOverlay">

  <div class="letter-layout" id="letterLayout">

    <!-- LETTER CARD -->
    <div class="letter-card" id="letterCard">
      <button class="close-btn" onclick="closeEnvelope()" title="Close">✕</button>

      <div class="letter-date" id="letterDate"></div>

      <div class="letter-body">hello</div>

      <div class="letter-sig-label">With love,</div>
      <div class="letter-sig">Jerry</div>

      <!-- COUNTDOWN — bottom of letter -->
      <div class="countdown-inner">
        <div class="cd-label">It's been</div>
        <div class="cd-chips">
          <span class="cd-num" id="cd-d">0</span><span class="cd-unit">&nbsp;days</span>
          <span class="cd-dot">·</span>
          <span class="cd-num" id="cd-h">00</span><span class="cd-unit">&nbsp;hours</span>
          <span class="cd-dot">·</span>
          <span class="cd-num" id="cd-m">00</span><span class="cd-unit">&nbsp;mins</span>
          <span class="cd-dot">·</span>
          <span class="cd-num" id="cd-s">00</span><span class="cd-unit">&nbsp;sec</span>
        </div>
        <div class="cd-label" style="margin-top:5px; margin-bottom:0;">since we met <span>♡</span></div>
      </div>

      <!-- VINYL PLAYER -->
      <div id="vinylSection"></div>
    </div>

    <!-- PHOTOS STRIP (mobile/tablet) -->
    <div class="photos-strip" id="photosStrip"></div>

    <!-- PHOTOS FLOAT (desktop) — injected by JS -->
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
/* ── PETALS ── */
const petalsEl = document.getElementById('petals');
['🌸','🌷','🪷','✿','🌺'].forEach(e => {
  for (let j = 0; j < 3; j++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = e;
    p.style.cssText = `left:${Math.random()*100}vw;font-size:${0.7+Math.random()*0.7}rem;` +
      `animation-duration:${8+Math.random()*8}s;animation-delay:${-Math.random()*14}s;`;
    petalsEl.appendChild(p);
  }
});

/* ── DATE ── */
document.getElementById('letterDate').textContent =
  new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

/* ── COUNTDOWN ── */
(function tickCountdown() {
  function pad(n) { return String(n).padStart(2, '0'); }
  function update() {
    const diff = Math.max(0, Date.now() - START_DATE.getTime());
    const totalSec = Math.floor(diff / 1000);
    document.getElementById('cd-d').textContent = Math.floor(totalSec / 86400);
    document.getElementById('cd-h').textContent = pad(Math.floor(totalSec / 3600) % 24);
    document.getElementById('cd-m').textContent = pad(Math.floor(totalSec / 60) % 60);
    document.getElementById('cd-s').textContent = pad(totalSec % 60);
  }
  update();
  setInterval(update, 1000);
})();

/* ── PHOTOS ── */
(function buildPhotos() {
  const photos = (PHOTOS || []).filter(Boolean).slice(0, 8);
  if (!photos.length) return;

  const layout = document.getElementById('letterLayout');
  const strip  = document.getElementById('photosStrip');

  /* Desktop scatter positions — alternating left/right columns, staggered vertically */
  const floatPositions = [
    { side: 'left',  top: '3%',   rotate: -4  },
    { side: 'right', top: '8%',   rotate:  3  },
    { side: 'left',  top: '28%',  rotate:  5  },
    { side: 'right', top: '33%',  rotate: -4  },
    { side: 'left',  top: '55%',  rotate: -3  },
    { side: 'right', top: '58%',  rotate:  5  },
    { side: 'left',  top: '78%',  rotate:  4  },
    { side: 'right', top: '80%',  rotate: -3  },
  ];

  const imgSize = 140; // px — desktop float size

  photos.forEach((url, i) => {
    /* ── STRIP item (mobile/tablet) ── */
    const item = document.createElement('div');
    item.className = 'photo-item';
    const fi = document.createElement('div');
    fi.className = 'photo-frame-inner';
    fi.style.cssText = `width:120px;height:120px;`;
    const img1 = document.createElement('img');
    img1.src = url; img1.alt = `photo ${i+1}`; img1.crossOrigin = 'anonymous';
    img1.onerror = () => { img1.style.display='none'; fi.innerHTML='<div class="img-fallback">🌸</div>'; };
    fi.appendChild(img1);
    item.appendChild(fi);
    item.onclick = () => openLightbox(url);
    strip.appendChild(item);

    /* ── FLOAT item (desktop) ── */
    const pos = floatPositions[i] || floatPositions[i % floatPositions.length];
    const floater = document.createElement('div');
    floater.className = 'photo-float';
    floater.style.cssText = `
      display: block;
      top: ${pos.top};
      ${pos.side}: ${pos.side === 'left' ? '10px' : '10px'};
      transform: rotate(${pos.rotate}deg);
      z-index: ${3 + i};
      width: ${imgSize}px;
    `;

    const fi2 = document.createElement('div');
    fi2.className = 'photo-frame-inner';
    fi2.style.cssText = `width:${imgSize}px;height:${imgSize}px;`;
    const img2 = document.createElement('img');
    img2.src = url; img2.alt = `photo ${i+1}`; img2.crossOrigin = 'anonymous';
    img2.onerror = () => { img2.style.display='none'; fi2.innerHTML='<div class="img-fallback" style="height:'+imgSize+'px">🌸</div>'; };
    fi2.appendChild(img2);
    floater.appendChild(fi2);
    floater.onclick = () => openLightbox(url);

    /* hover lift */
    floater.addEventListener('mouseenter', () => {
      floater.style.transform = `rotate(0deg) scale(1.06)`;
      floater.style.boxShadow = '0 12px 32px rgba(197,96,122,0.28)';
    });
    floater.addEventListener('mouseleave', () => {
      floater.style.transform = `rotate(${pos.rotate}deg)`;
      floater.style.boxShadow = '';
    });

    layout.appendChild(floater);
  });

  /* On desktop, push the card inward so photos don't overlap it */
  function applyLayout() {
    const w = window.innerWidth;
    if (w >= 900) {
      /* photos sit in outer 180px on each side */
      layout.style.paddingLeft  = '190px';
      layout.style.paddingRight = '190px';
      document.querySelectorAll('.photo-float').forEach((f, i) => {
        f.style.display = 'block';
        const pos = floatPositions[i] || floatPositions[i % floatPositions.length];
        if (pos.side === 'left')  f.style.left  = '8px',  f.style.right = '';
        if (pos.side === 'right') f.style.right = '8px',  f.style.left  = '';
      });
      strip.style.display = 'none';
    } else {
      layout.style.paddingLeft  = '0';
      layout.style.paddingRight = '0';
      document.querySelectorAll('.photo-float').forEach(f => f.style.display = 'none');
      strip.style.display = 'flex';
    }
  }
  applyLayout();
  window.addEventListener('resize', applyLayout);
})();

/* ── VINYL PLAYER ── */
(function buildVinyl() {
  const { link, service, title, artist, albumArt, duration } = MUSIC;
  const isSpotify = service === 'Spotify';
  const svcIcon = isSpotify
    ? `<svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`
    : `<svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M23.994 6.124a9.23 9.23 0 0 0-.24-2.19c-.317-1.31-1.062-2.31-2.18-3.043a5.022 5.022 0 0 0-1.762-.668c-.69-.124-1.38-.155-2.07-.155H6.15c-.8 0-1.57.05-2.33.204A4.882 4.882 0 0 0 .986 2.765C.096 3.838-.008 5.08 0 6.363v11.55c.01 1.274.106 2.484.99 3.53.91 1.076 2.166 1.558 3.55 1.558h15c1.33 0 2.57-.45 3.48-1.483.97-1.09 1-2.38.98-3.67V6.124zm-7.683 7.19a2.78 2.78 0 0 1-2.754 2.814 2.78 2.78 0 0 1-2.754-2.814v-4.29l5.508 1.636v2.654z"/></svg>`;

  const artImg = albumArt
    ? `<img src="${albumArt}" alt="album art" crossorigin="anonymous" onerror="this.style.display='none'">`
    : '';

  document.getElementById('vinylSection').innerHTML = `
  <div class="vinyl-wrap">
    <div class="vinyl-header-label">a song for you ✦</div>
    <div class="vinyl-player">
      <div class="vinyl-disc-wrap">
        <div class="vinyl-disc" id="vinylDisc">
          <div class="vinyl-art" id="vinylArt">${artImg}</div>
          <div class="vinyl-spindle"></div>
        </div>
        <div class="vinyl-needle" id="vinylNeedle">
          <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="31" cy="4" r="3.5" fill="#c5607a" stroke="#fde2ea" stroke-width="1"/>
            <line x1="31" y1="5" x2="10" y2="32" stroke="#c5607a" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="10" cy="32" r="2.2" fill="#e8899a"/>
          </svg>
        </div>
      </div>
      <div class="vinyl-info">
        <div class="vinyl-meta">
          <div class="vinyl-thumb">${artImg}</div>
          <div class="vinyl-text">
            <div class="vinyl-track">${title}</div>
            <div class="vinyl-artist">${artist}</div>
          </div>
        </div>
        <div class="vinyl-controls">
          <button class="vbtn" onclick="vinylPrev()" title="Restart">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="vbtn play-btn" id="vinylPlay" onclick="vinylToggle()">
            <svg id="playIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="vbtn" onclick="vinylNext()" title="Skip">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.9V8.1L8.5 12zM16 6h2v12h-2z"/></svg>
          </button>
        </div>
        <div class="vinyl-progress-wrap" id="progressWrap" onclick="vinylSeek(event)">
          <div class="vinyl-progress-fill" id="progressFill"></div>
        </div>
        <div class="vinyl-time"><span id="vinylCurrent">0:00</span><span id="vinylTotal">0:00</span></div>
      </div>
    </div>
    <a class="vinyl-open-link" href="${link}" target="_blank" rel="noopener">
      ${svcIcon} Open in ${service}
    </a>
  </div>`;

  let playing = false, elapsed = 0;
  const dur = duration || 214;
  let raf;
  function fmt(s) { return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0'); }
  document.getElementById('vinylTotal').textContent = fmt(dur);

  function tick() {
    if (!playing) return;
    elapsed = Math.min(elapsed + 0.5, dur);
    document.getElementById('progressFill').style.width = (elapsed / dur * 100) + '%';
    document.getElementById('vinylCurrent').textContent = fmt(elapsed);
    if (elapsed >= dur) elapsed = 0;
    raf = setTimeout(tick, 500);
  }

  window.vinylToggle = function() {
    playing = !playing;
    const disc = document.getElementById('vinylDisc');
    const needle = document.getElementById('vinylNeedle');
    const icon = document.getElementById('playIcon');
    if (playing) {
      disc.classList.add('spinning');
      needle.classList.add('playing');
      icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      tick();
    } else {
      disc.classList.remove('spinning');
      needle.classList.remove('playing');
      icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      clearTimeout(raf);
    }
  };
  window.vinylPrev = function() { elapsed = 0; document.getElementById('progressFill').style.width='0%'; document.getElementById('vinylCurrent').textContent='0:00'; };
  window.vinylNext = function() { elapsed = 0; document.getElementById('progressFill').style.width='0%'; document.getElementById('vinylCurrent').textContent='0:00'; };
  window.vinylSeek = function(e) {
    const r = document.getElementById('progressWrap').getBoundingClientRect();
    const f = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    elapsed = f * dur;
    document.getElementById('progressFill').style.width = (f*100)+'%';
    document.getElementById('vinylCurrent').textContent = fmt(elapsed);
  };
})();

/* ── ENVELOPE OPEN / CLOSE ── */
let opened = false;
function openEnvelope() {
  if (opened) return;
  opened = true;
  document.getElementById('env').classList.add('opened');
  document.getElementById('hint').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('letterOverlay').classList.add('visible');
    document.getElementById('letterOverlay').scrollTop = 0;
    burstHearts();
  }, 600);
}
function closeEnvelope() {
  document.getElementById('letterOverlay').classList.remove('visible');
  setTimeout(() => {
    document.getElementById('env').classList.remove('opened');
    document.getElementById('hint').style.opacity = '';
    opened = false;
  }, 450);
}

/* ── LIGHTBOX ── */
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

/* ── HEARTS ── */
function burstHearts() {
  const icons = ['💗','💕','💖','💓','🌸','✨'];
  for (let i = 0; i < 14; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = icons[Math.floor(Math.random() * icons.length)];
    const angle = (i / 14) * 2 * Math.PI;
    const dist = 70 + Math.random() * 90;
    h.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    h.style.setProperty('--dy', Math.sin(angle) * dist - 40 + 'px');
    h.style.left = (window.innerWidth / 2 - 10) + 'px';
    h.style.top  = (window.innerHeight / 2 - 10) + 'px';
    h.style.animationDelay = (Math.random() * 0.15) + 's';
    document.body.appendChild(h);
    h.addEventListener('animationend', () => h.remove());
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeEnvelope(); }
});
</script>
</body>
</html>
